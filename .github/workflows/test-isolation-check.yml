name: Test Isolation Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Make script executable
        run: chmod +x scripts/check-test-isolation.sh

      - name: Check test isolation patterns
        run: ./scripts/check-test-isolation.sh