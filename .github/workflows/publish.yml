name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type (use 'current' to publish the version already in package.json)"
        required: true
        type: choice
        options:
          - current
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Lint and type check
        run: bun run lint && bunx tsc --noEmit

      - name: Test
        run: bun test --bail=1

      - name: Bump version
        if: inputs.version_bump != 'current'
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          npm version "$VERSION_BUMP" -m 'release: v%s'

      - name: Push version commit
        if: inputs.version_bump != 'current'
        run: git push --follow-tags

      - name: Create tag (current version)
        if: inputs.version_bump == 'current'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Publish to npm
        run: npm publish --provenance --access public
