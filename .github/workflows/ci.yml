name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Test with coverage
        run: bun test --coverage --bail 1
